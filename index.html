<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador CESVE - Vento ATC</title>
  <meta name="description" content="Buscador de CESVE con filtros por estado, municipio y texto libre." />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    /* VARIABLES DE COLOR - VENTO ATC */
    :root {
      --white: #ffffff;
      --orange: #ff5722;      /* Naranja Vento */
      --orange-dark: #e64a19; /* Naranja Vento Oscuro */
      --dark-blue: #0f172a;   /* Azul Oscuro de Encabezados */
      --slate: #1e293b;       /* Gris Pizarra */
      --gray: #64748b;        /* Gris de Texto Secundario */
      --light-gray: #f1f5f9;  /* Fondo de la Página */
      --border: #e2e8f0;      /* Bordes de Contenedores */
      --text: #1e293b;        /* Texto Principal */
      --shadow: 0 4px 12px rgba(15, 23, 42, 0.05);
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--text);
      background-color: var(--light-gray);
      padding: 20px;
    }

    .page-shell {
      width: min(1200px, calc(100% - 1rem));
      margin: 0 auto;
    }

    /* ENCABEZADO ESTILO HERO */
    .hero {
      background-color: var(--dark-blue);
      color: var(--white);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      border-left: 5px solid var(--orange);
      display: flex;
      justify-content: space-between;
      gap: 1.5rem;
      align-items: center;
    }

    .eyebrow {
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--orange);
      font-weight: 800;
      font-size: 10px;
      margin: 0 0 4px;
    }

    .hero h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
    }

    .hero-copy {
      max-width: 760px;
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin: 6px 0 0;
    }

    /* RELOJ EN TIEMPO REAL */
    .hero-clock {
      min-width: 150px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 87, 34, 0.3);
      border-radius: 6px;
      text-align: right;
    }

    .hero-clock span {
      display: block;
      color: #94a3b8;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .hero-clock strong {
      color: var(--orange);
      font-size: 16px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    /* CONTENEDORES BASE */
    .controls-card,
    .result-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    /* FILTROS Y CONTROLES */
    .controls-card {
      padding: 15px;
      margin-bottom: 20px;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field span {
      font-size: 12px;
      font-weight: 700;
      color: var(--dark-blue);
    }

    .field input,
    .field select {
      width: 100%;
      border-radius: 6px;
      border: 2px solid var(--border);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 600;
      background: var(--white);
      color: var(--text);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--orange);
    }

    .actions {
      justify-content: flex-end;
    }

    #clearFilters {
      border: 0;
      border-radius: 25px;
      padding: 11px 20px;
      font-weight: 700;
      font-size: 13px;
      background: linear-gradient(135deg, var(--orange) 0%, #ff7043 100%);
      color: var(--white);
      cursor: pointer;
      transition: background 0.2s;
    }

    #clearFilters:hover {
      background: var(--orange-dark);
    }

    /* CUADRÍCULA DE RESULTADOS */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 15px;
    }

    /* TARJETAS DE RESULTADOS */
    .result-card {
      padding: 16px;
      display: flex;
      flex-direction: column;
      border-left: 4px solid var(--orange);
    }

    .result-top {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 10px;
    }

    .result-id {
      margin: 0;
      font-size: 11px;
      font-weight: bold;
      color: var(--gray);
    }

    .result-tag {
      background: rgba(255, 87, 34, 0.1);
      color: var(--orange-dark);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 700;
    }

    .result-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
      color: var(--dark-blue);
      line-height: 1.3;
    }

    .result-subtitle {
      margin: 4px 0 12px;
      color: var(--gray);
      font-size: 12px;
      font-style: italic;
    }

    .result-meta,
    .result-contact {
      display: grid;
      gap: 4px;
      font-size: 12px;
      border-top: 1px solid var(--light-gray);
      padding-top: 8px;
      margin-top: 4px;
    }

    .result-meta p,
    .result-contact p {
      margin: 0;
      color: var(--slate);
    }

    .result-meta strong,
    .result-contact strong {
      color: var(--dark-blue);
    }

    .empty-state {
      grid-column: 1 / -1;
      padding: 40px;
      text-align: center;
      color: var(--gray);
    }
    
    .empty-state h2 {
      margin: 0 0 8px 0;
      color: var(--dark-blue);
    }

    /* RESPONSIVE */
    @media (max-width: 900px) {
      .hero,
      .controls-grid {
        grid-template-columns: 1fr;
        display: grid;
      }

      .hero {
        align-items: start;
      }

      .hero-clock {
        text-align: left;
      }
    }
  </style>
</head>
<body>

  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">MÓDULO DE SVE</p>
        <h1>Buscador Oficial de CESVE</h1>
        <p class="hero-copy">
          Encuentra rápidamente centros, contactos y datos de la hoja oficial de CESVE. 
          Filtra dinámicamente por texto libre, estado y sus municipios correspondientes.
        </p>
      </div>
      <div class="hero-clock">
        <span>Hora de operación</span>
        <strong id="relojATC">00:00:00</strong>
      </div>
    </header>

    <main>
      <section class="controls-card">
        <div class="controls-grid">
          <label class="field">
            <span>Buscar</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Razón social, nombre comercial, ciudad, correo o ID"
            />
          </label>

          <label class="field">
            <span>Estado</span>
            <select id="stateFilter" onchange="actualizarFiltroMunicipios()">
              <option value="">Todos los estados</option>
            </select>
          </label>

          <label class="field">
            <span>Municipio / Ciudad</span>
            <select id="cityFilter">
              <option value="">Todas las ciudades</option>
            </select>
          </label>

          <div class="field actions">
            <button id="clearFilters" type="button"><i class="fa-solid fa-filter-circle-xmark"></i> Limpiar filtros</button>
          </div>
        </div>
      </section>

      <section id="resultsContainer" class="results-grid" aria-live="polite"></section>
    </main>
  </div>

  <template id="resultTemplate">
    <article class="result-card">
      <div class="result-top">
        <p class="result-id"></p>
        <span class="result-tag"></span>
      </div>
      <h2 class="result-title"></h2>
      <p class="result-subtitle"></p>
      <div class="result-meta"></div>
      <div class="result-contact"></div>
    </article>
  </template>

  <script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1EAZdpf0K5t0h6r32Z_39xTA1FnkdZ99xDngG8VhyNvA/export?format=csv';

    const searchInput = document.getElementById('searchInput');
    const stateFilter = document.getElementById('stateFilter');
    const cityFilter = document.getElementById('cityFilter');
    const clearFiltersButton = document.getElementById('clearFilters');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultTemplate = document.getElementById('resultTemplate');

    let rows = [];
    let allStates = [];

    // RELOJ EN TIEMPO REAL ACTIVO
    setInterval(() => {
      document.getElementById('relojATC').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = '';
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            field += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
          continue;
        }

        if (char === ',' && !inQuotes) {
          row.push(field);
          field = '';
          continue;
        }

        if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && next === '\n') {
            i += 1;
          }
          row.push(field);
          rows.push(row);
          row = [];
          field = '';
          continue;
        }

        field += char;
      }

      if (field.length > 0 || row.length > 0) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function normalize(value) {
      return String(value ?? '').trim().toLowerCase();
    }

    function buildRecord(csvRow, headers) {
      const record = {};

      headers.forEach((header, index) => {
        record[header] = csvRow[index] ?? '';
      });

      const searchable = [
        record['ID CESVE'],
        record['RAZON SOCIAL'],
        record['NOMBRE COMERCIAL'],
        record['CIUDAD / MUNICIPIO'],
        record['ESTADO'],
        record['MAIL'],
        record['CELULAR'],
        record['TELEFONO'],
        record['REGIONAL VENTO'],
        record['TERRITORIAL VENTO'],
        record['CALLE'],
        record['COLONIA'],
      ]
        .filter(Boolean)
        .join(' ');

      return {
        ...record,
        searchable: searchable.toLowerCase(),
      };
    }

    function cargarEstadosEnFiltro() {
      stateFilter.innerHTML = '<option value="">Todos los estados</option>';
      allStates
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b))
        .forEach((state) => {
          const option = document.createElement('option');
          option.value = state;
          option.textContent = state;
          stateFilter.appendChild(option);
        });
      
      // Inicializar el filtro de ciudades vacío o completo
      actualizarFiltroMunicipios();
    }

    // EVENTO CLAVE: Cambia los municipios según el Estado seleccionado
    function actualizarFiltroMunicipios() {
      const estadoSeleccionado = normalize(stateFilter.value);
      cityFilter.innerHTML = '<option value="">Todas las ciudades</option>';

      // Si hay estado seleccionado, filtra los municipios de ese estado, si no, toma todos los existentes
      const municipiosFiltrados = rows
        .filter(row => !estadoSeleccionado || normalize(row['ESTADO']) === estadoSeleccionado)
        .map(row => row['CIUDAD / MUNICIPIO'])
        .filter(Boolean);

      // Eliminar duplicados de municipios y ordenarlos
      const ciudadesUnicas = [...new Set(municipiosFiltrados)].sort((a, b) => a.localeCompare(b));

      ciudadesUnicas.forEach((city) => {
        const option = document.createElement('option');
        option.value = city;
        option.textContent = city;
        cityFilter.appendChild(option);
      });

      // Ejecutar filtrado de tarjetas
      filterRecords();
    }

    function renderResults(filteredRows) {
      resultsContainer.innerHTML = '';

      if (!filteredRows.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.innerHTML = '<h2>No se encontraron resultados</h2><p>Intenta cambiar los filtros o el texto de búsqueda.</p>';
        resultsContainer.appendChild(empty);
        return;
      }

      filteredRows.forEach((record) => {
        const card = resultTemplate.content.firstElementChild.cloneNode(true);

        const title = record['RAZON SOCIAL'] || record['NOMBRE COMERCIAL'] || 'CESVE';
        const subtitle = record['NOMBRE COMERCIAL'] && record['NOMBRE COMERCIAL'] !== record['RAZON SOCIAL']
          ? record['NOMBRE COMERCIAL']
          : 'Sin nombre comercial registrado';

        card.querySelector('.result-id').textContent = `ID CESVE: ${record['ID CESVE'] || 'No disponible'}`;
        card.querySelector('.result-tag').textContent = `${record['ESTADO'] || 'Sin estado'} • ${record['CIUDAD / MUNICIPIO'] || 'Sin ciudad'}`;
        card.querySelector('.result-title').textContent = title;
        card.querySelector('.result-subtitle').textContent = subtitle;

        const meta = [
          `<p><strong><i class="fa-solid fa-location-dot" style="color:var(--orange);"></i> Dirección:</strong> ${[record['CALLE'], record['NÚMERO (EXT / INT)'], record['COLONIA'], record['C.P.']].filter(Boolean).join(', ') || 'Sin dirección registrada'}</p>`,
          `<p><strong><i class="fa-solid fa-user-tie"></i> Regional VENTO:</strong> ${record['REGIONAL VENTO'] || 'No disponible'}</p>`,
          `<p><strong><i class="fa-solid fa-map-location-dot"></i> Territorial VENTO:</strong> ${record['TERRITORIAL VENTO'] || 'No disponible'}</p>`,
        ].join('');

        const contact = [
          `<p><strong><i class="fa-solid fa-envelope"></i> Correo:</strong> ${record['MAIL'] || 'No disponible'}</p>`,
          `<p><strong><i class="fa-solid fa-phone"></i> Teléfono:</strong> ${record['TELEFONO'] || 'No disponible'}</p>`,
          `<p><strong><i class="fa-solid fa-mobile-screen-button"></i> Celular:</strong> ${record['CELULAR'] || 'No disponible'}</p>`,
        ].join('');

        card.querySelector('.result-meta').innerHTML = meta;
        card.querySelector('.result-contact').innerHTML = contact;

        resultsContainer.appendChild(card);
      });
    }

    function filterRecords() {
      const searchTerm = normalize(searchInput.value);
      const state = normalize(stateFilter.value);
      const city = normalize(cityFilter.value);

      const filtered = rows.filter((record) => {
        const matchesSearch = !searchTerm || record.searchable.includes(searchTerm);
        const matchesState = !state || normalize(record['ESTADO']) === state;
        const matchesCity = !city || normalize(record['CIUDAD / MUNICIPIO']) === city;

        return matchesSearch && matchesState && matchesCity;
      });

      renderResults(filtered);
    }

    async function loadSheet() {
      try {
        const response = await fetch(SHEET_URL, { mode: 'cors', redirect: 'follow' });

        if (!response.ok) {
          throw new Error(`No se pudo cargar la hoja (${response.status})`);
        }

        const text = await response.text();
        const parsed = parseCsv(text);

        if (!parsed.length) {
          throw new Error('La hoja no devolvió registros');
        }

        const headers = parsed[0].map((header) => header.trim());
        rows = parsed.slice(1).map((csvRow) => buildRecord(csvRow, headers));

        allStates = [...new Set(rows.map((row) => row['ESTADO']).filter(Boolean))];

        cargarEstadosEnFiltro();
      } catch (error) {
        console.error(error);
        resultsContainer.innerHTML = `<div class="empty-state"><h2 style="color:#ef4444;">Error de Conexión</h2><p>No fue posible enlazar con la base de datos de Google Sheets. Detalles: ${error.message}</p></div>`;
      }
    }

    searchInput.addEventListener('input', filterRecords);
    cityFilter.addEventListener('change', filterRecords);
    
    clearFiltersButton.addEventListener('click', () => {
      searchInput.value = '';
      stateFilter.value = '';
      actualizarFiltroMunicipios(); // Limpia y restablece cascada de municipios
    });

    loadSheet();
  </script>
</body>
</html>
